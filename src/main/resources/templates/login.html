<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Constructora - Portal de Administración</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
</head>

<body class="login-bg d-flex align-items-center justify-content-center min-vh-100">

    <div class="login-container text-center p-4">

        <div class="mb-3 mx-auto d-flex align-items-center justify-content-center">
            <!-- Recuerda cambiar la ruta de tu logo por el de la constructora -->
            <img src="/img/Logo.png" alt="Logo Constructora" class="login-brand-img">
        </div>

        <div class="login-card p-4 text-start">
            <h3 class="text-white h5 mb-4"><strong>Iniciar sesión</strong></h3>

            <!-- Se agrega action y method para que Spring Security intercepte la petición -->
            <form id="loginForm" action="/login" method="POST">
                <div class="mb-3">
                    <label for="username" class="form-label text-light small">Usuario</label>
                    <!-- El atributo name="username" es OBLIGATORIO para Spring Security -->
                    <input type="text" class="form-control login-input" id="username" name="username" placeholder="admin" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label text-light small">Contraseña</label>
                    <!-- El atributo name="password" es OBLIGATORIO para Spring Security -->
                    <input type="password" class="form-control login-input" id="password" name="password" placeholder="********" required>
                </div>

                <!-- Modificamos el texto del error. Por seguridad, no se especifica si falló el usuario o la contraseña -->
                <div id="errorMessage" class="alert alert-danger d-none py-2 small text-center login-error-alert">
                    Usuario o contraseña incorrectos.
                </div>

                <button type="submit" class="btn btn-submit w-100 py-2">Ingresar</button>
            </form>

        </div>
    </div>

    <script src="js/login.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
